spring:
  application:
    name: eyewear_management_backend
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    url: YOUR_SQLSERVER_JDBC_URL
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  jackson:
    time-zone: Asia/Ho_Chi_Minh

  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_GMAIL_ADDRESS
    password: YOUR_GMAIL_APP_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  tomcat:
    max-part-count: 100

jwt:
  signerKey: YOUR_JWT_SIGNER_KEY
  valid-duration: 3600
  refreshable-duration: 36000

ghn:
  base-url: https://dev-online-gateway.ghn.vn/shiip/public-api
  token: YOUR_GHN_TOKEN
  shop-id: YOUR_GHN_SHOP_ID
  from-district-id: 1451
  from-ward-code: 20904
  preferred-service-type-id: 2
  payment-type-id: 2
  required-note: CHOTHUHANG
  cod-max-amount: 5000000

  pkg:
    length: 20
    width: 15
    height: 8

    weight:
      contact-lens: 120
      lens: 220
      frame: 300
      prescription: 450
      def: 250

cloudinary:
  cloud-name: YOUR_CLOUDINARY_CLOUD_NAME
  api-key: YOUR_CLOUDINARY_API_KEY
  api-secret: YOUR_CLOUDINARY_API_SECRET

vnpay:
  pay-url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  tmn-code: YOUR_VNPAY_TMN_CODE
  hash-secret: YOUR_VNPAY_HASH_SECRET
  return-url: https://api-eyewear.purintech.id.vn/payments/vnpay/return
  ipn-url: http://api-eyewear.purintech.id.vn/payments/vnpay/ipn
  version: "2.1.0"
  command: "pay"
  curr-code: "VND"
  locale: "vn"
  order-type: "other"
  expire-minutes: 15

app:
  backend:
    base-url: http://localhost:8080
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "https://*.purintech.id.vn"
      - "https://*.vercel.app"
      - "http://103.118.29.230:*/"
      - "https://api-eyewear.sora.io.vn"
  frontend:
    base-url: https://eyewear-management-frontend-nine.vercel.app
    success-path: /success
    cancel-path: /cancel
    fail-path: /payment-result
  gemini:
    enabled: true
    api-key: YOUR_GEMINI_API_KEY
    model: gemini-2.5-flash
    base-url: https://generativelanguage.googleapis.com
    timeout-seconds: 20
  ocr:
    enabled: true
    endpoint: https://api.ocr.space/parse/image
    api-key: YOUR_OCR_API_KEY
    language: eng
    timeout-seconds: 20
    max-file-size-bytes: 5242880

payos:
  client-id: YOUR_PAYOS_CLIENT_ID
  api-key: YOUR_PAYOS_API_KEY
  checksum-key: YOUR_PAYOS_CHECKSUM_KEY

springdoc:
  packages-to-scan: com.swp391.eyewear_management_backend.controller
