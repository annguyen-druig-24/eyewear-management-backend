  payment-type-id: ${GHN_PAYMENT_TYPE_ID:2}
  required-note: ${GHN_REQUIRED_NOTE:CHOTHUHANG}
  cod-max-amount: ${GHN_COD_MAX_AMOUNT:5000000}

