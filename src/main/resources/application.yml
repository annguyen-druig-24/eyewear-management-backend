spring:
  application:
    name: eyewear_management_backend
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB       # Giới hạn tối đa cho 1 file (ví dụ 1 hình max 50MB)
      max-request-size: 100MB   # Giới hạn tổng dung lượng của 1 lần gửi (ví dụ gửi 2 hình, mỗi hình 40MB thì tổng là 80MB < 100MB -> OK)

  datasource:
    url: jdbc:sqlserver://database.purintech.id.vn:1433;databaseName=EyewearManagement;encrypt=true;trustServerCertificate=true
    username: eyewear
    password: eyewear
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
  jackson:
    time-zone: Asia/Ho_Chi_Minh

# Phần cấu hình Server (cho Tomcat)
server:
  port: 8080 # (Hoặc port bạn đang dùng)
  tomcat:
    max-part-count: 100 # Chống lỗi giới hạn 10 file lúc nãy

jwt:
  signerKey: 56235e27daf8f8e68ce33febf5400cf93dbd5f6ec40a14531754168ea0d32486
  valid-duration: 3600
  refreshable-duration: 36000

